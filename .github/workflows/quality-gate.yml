name: Quality Gate

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.9
  CI: true
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/yugioh_tools

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript typecheck
        run: bun run typecheck

      - name: Run test suite
        run: bun run test

      - name: Build production bundle
        run: bun run build
