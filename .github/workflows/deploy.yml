name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_migration_image:
        description: Push the migration image even if no new SQL migration files changed
        required: false
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: 1.3.9
  CI: true
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/yugioh_tools

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript typecheck
        run: bun run typecheck

      - name: Run test suite
        run: bun run test

      - name: Build production bundle
        run: bun run build

  changes:
    name: Determine migration release requirements
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      should_run_migrations: ${{ steps.detect.outputs.should_run_migrations }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect whether migrations should run
        id: detect
        shell: bash
        run: |
          should_run_migrations=false

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${{ github.event.inputs.push_migration_image }}" == "true" ]]; then
              should_run_migrations=true
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            before_sha="${{ github.event.before }}"
            after_sha="${{ github.sha }}"

            if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after_sha")"
            else
              changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
            fi

            if grep -qE '^drizzle/.*\.sql$' <<< "$changed_files"; then
              should_run_migrations=true
            fi
          fi

          echo "should_run_migrations=${should_run_migrations}" >> "$GITHUB_OUTPUT"

  docker:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: quality
    if: github.ref == 'refs/heads/main'
    environment: production
    outputs:
      image_ref: ${{ steps.image_ref.outputs.image_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ secrets.TCR_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            BUN_VERSION=${{ env.BUN_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Record immutable image reference
        id: image_ref
        run: echo "image_ref=${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ secrets.TCR_REPOSITORY }}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  docker-migrate:
    name: Build and push migration image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - quality
      - changes
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.should_run_migrations == 'true'
    environment: production
    outputs:
      image_ref: ${{ steps.image_ref.outputs.image_ref }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Extract migration Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ secrets.TCR_REPOSITORY }}-migrate
          tags: |
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.migrate
          build-args: |
            BUN_VERSION=${{ env.BUN_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Record immutable migration image reference
        id: image_ref
        run: echo "image_ref=${{ secrets.TCR_REGISTRY }}/${{ secrets.TCR_NAMESPACE }}/${{ secrets.TCR_REPOSITORY }}-migrate:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  migrate:
    name: Trigger Dokploy migrations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - changes
      - docker
      - docker-migrate
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.should_run_migrations == 'true'
    environment: production

    steps:
      - name: Call Dokploy migration webhook
        env:
          DOKPLOY_MIGRATION_WEBHOOK_URL: ${{ secrets.DOKPLOY_MIGRATION_WEBHOOK_URL }}
          MIGRATION_IMAGE_REF: ${{ needs.docker-migrate.outputs.image_ref }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "{\"repository\":\"${GITHUB_REPOSITORY}\",\"sha\":\"${GITHUB_SHA}\",\"image\":\"${MIGRATION_IMAGE_REF}\"}" \
            "$DOKPLOY_MIGRATION_WEBHOOK_URL"

  deploy:
    name: Trigger Dokploy deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - docker
      - migrate
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.docker.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    environment: production

    steps:
      - name: Call Dokploy deployment webhook
        env:
          DOKPLOY_DEPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK_URL }}
          IMAGE_REF: ${{ needs.docker.outputs.image_ref }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "{\"repository\":\"${GITHUB_REPOSITORY}\",\"sha\":\"${GITHUB_SHA}\",\"image\":\"${IMAGE_REF}\"}" \
            "$DOKPLOY_DEPLOY_WEBHOOK_URL"
