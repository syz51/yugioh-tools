name: Trigger Production Migrations

on:
  workflow_dispatch:

concurrency:
  group: production-db-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Call Dokploy migration webhook
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Call Dokploy migration webhook
        env:
          DOKPLOY_MIGRATION_WEBHOOK_URL: ${{ secrets.DOKPLOY_MIGRATION_WEBHOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H 'Content-Type: application/json' \
            --data "{\"repository\":\"${GITHUB_REPOSITORY}\",\"sha\":\"${GITHUB_SHA}\"}" \
            "$DOKPLOY_MIGRATION_WEBHOOK_URL"
